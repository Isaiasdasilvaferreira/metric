<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Metric Rankings | Classificação dos Alunos</title>
    <link rel="stylesheet" href="./CSS/index.css"/>
    <link rel="stylesheet" href="./CSS/background.css"/>
    <link rel="stylesheet" href="./CSS/responsividade.css"/>
    <link rel="icon" type="image/x-icon" href="./IMAGES/Metric - Logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="math-background" id="mathBackground"></div>

    <div class="app">
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon">
                        <img src="./IMAGES/Metric - Logo.jpg" alt="Metric Logo" class="logo-image" />
                    </div>
                    <div class="logo-text">
                        <h1>METRIC</h1>
                        <p>RANKINGS</p>
                    </div>
                </div>
                <nav class="nav">
                    <button class="nav-link active" data-view="students">
                        <i class="fas fa-user-graduate"></i>
                        <span>Alunos</span>
                    </button>
                    <button class="nav-link" data-view="classes">
                        <i class="fas fa-layer-group"></i>
                        <span>Turmas</span>
                    </button>
                    <button class="nav-link" data-view="schools">
                        <i class="fas fa-building"></i>
                        <span>Escolas</span>
                    </button>
                </nav>
            </div>
        </header>

        <main class="main">
            <div class="rank-header">
                <div class="rank-title-group">
                    <h1>
                        <i class="fas fa-chart-line"></i>
                        Ranking <span id="rankLabel">de Alunos</span>
                    </h1>
                    <div class="period-badge">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Ranking por Bimestre</span>
                    </div>
                </div>
                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar por código (Ex: STD-001)" autocomplete="off" />
                        <button id="searchBtn" class="search-btn">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                    <div id="searchFeedback" class="search-feedback"></div>
                </div>
            </div>

            <div class="ranking-card-container">
                
                <div id="schoolClassesFilter" class="school-classes-filter" style="display: none;">
                    <div class="filter-group">
                         <div class="filter-info">
                        <i class="fas fa-school"></i>
                        
                        <span id="selectedSchoolName"></span>
                    </div>
                        <label><i class="fas fa-chalkboard-user"></i> Filtrar por turma:</label>
                        <select id="classBySchoolFilter">
                            <option value="all">Todas as turmas</option>
                        </select>
                        
                    </div>
                </div>
                

                <div id="shiftFilterContainer" class="shift-filter-wrapper" style="display: none;">
                    <div class="shift-filter">
                        <div class="filter-group shift-group">
                            <label><i class="fas fa-clock"></i> Turno:</label>
                            <select id="shiftFilter">
                                <option value="all">Todos os turnos</option>
                                <option value="Manhã">Manhã</option>
                                <option value="Tarde">Tarde</option>
                                <option value="Noite">Noite</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="classDetailsPanel" class="class-details-panel" style="display: none;">
                    <div class="class-details-header">
                        <button id="backToClassesBtn" class="back-btn">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </button>
                        <div class="class-details-title">
                            <i class="fas fa-users"></i>
                            <span id="selectedClassName"></span>
                        </div>
                    </div>
                    <div id="classStudentsList" class="class-students-list"></div>
                </div>

                <div class="ranking-scroll-area">
                    <div id="rankList" class="rank-list">
                        <div class="loading">
                            <i class="fas fa-spinner fa-pulse"></i>
                            <p>Carregando rankings...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-container">
                <div class="footer-brand">
                    <div class="footer-logo">
                        <img src="./IMAGES/Metric - Logo.jpg" alt="Metric Logo" class="footer-logo-image" />
                    </div>
                    <div class="footer-brand-text">
                        <h3>METRIC</h3>
                        <p>Sistema de Correção e Ranqueamento Escolar</p>
                    </div>
                </div>
                
                <div class="footer-contact">
                    <a href="https://www.instagram.com/nwarelink" class="contact-item">
                        <i class="fab fa-instagram"></i>
                        <span>@nwarelink</span>
                    </a>
                    <a href="mailto:nwarelink26@gmail.com?subject=Contato%20Metric%20Rankings" class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <span>nwarelink26@gmail.com</span>
                    </a>
                </div>
                
                <div class="footer-info">
                    <p class="copyright">
                        <i class="fas fa-code"></i>
                        Desenvolvido por NwareLink
                    </p>
                    <p class="rights">
                        © 2026 NwareLink. Todos os direitos reservados.
                    </p>
                </div>
            </div>
        </footer>
    </div>

    <script src="JS/background.js"></script>
    <script src="JS/index.js"></script>

    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
