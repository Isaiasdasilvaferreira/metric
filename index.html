<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Metric Rankings</title>
    <link rel="stylesheet" href="./CSS/index.css" />
    <link rel="stylesheet" href="./CSS/background.css" />
    <link rel="stylesheet" href="./CSS/responsividade.css" />
    <link rel="icon" href="./IMAGES/Metric-Logo.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="math-background" id="mathBackground"></div>

    <div class="app">
      <header class="header">
        <div class="header-inner">
          <div class="logo">
            <img 
              src="./IMAGES/Metric-Logo.ico" 
              alt="Metric Logo" 
              width="40" 
              height="40"
              style="border-radius: 12px;"
            />
            <div class="logo-text">
              <span>METRIC</span>
              <span>RANKINGS</span>
            </div>
          </div>
          <nav class="nav">
            <button class="nav-link active" data-view="students">
              <i class="fas fa-user-graduate"></i>
              <span>Alunos</span>
            </button>
            <button class="nav-link" data-view="classes">
              <i class="fas fa-layer-group"></i>
              <span>Turmas</span>
            </button>
            <button class="nav-link" data-view="schools">
              <i class="fas fa-building"></i>
              <span>Escolas</span>
            </button>
          </nav>
        </div>
      </header>

      <main class="main">
        <div class="main-inner">
          <div class="rank-header">
            <div class="rank-title-group">
              <h1>
                <i class="fas fa-chart-simple"></i>
                Ranking <span id="rankLabel">de Alunos</span>
              </h1>
              <div class="period-badge">
                <i class="fas fa-calendar-alt"></i>
                <span>Ranking por Bimestre</span>
              </div>
            </div>
            <div class="search-section">
              <div class="search-box">
                <i class="fas fa-search"></i>
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Buscar"
                  autocomplete="off"
                />
                <button id="searchBtn" class="search-btn">
                  <i class="fas fa-arrow-right"></i>
                </button>
              </div>
              <div id="searchFeedback" class="search-feedback"></div>
            </div>
          </div>

          <!-- CARD PRINCIPAL COM SCROLL -->
          <div class="ranking-card-container">
            <!-- Container para os filtros dinâmicos (turmas por escola) -->
            <div id="schoolClassesFilter" class="school-classes-filter" style="display: none;">
              <div class="filter-group">
                <label><i class="fas fa-chalkboard-user"></i> Turmas da escola:</label>
                <select id="classBySchoolFilter">
                  <option value="all">Todas as turmas</option>
                </select>
              </div>
              <div class="filter-info">
                <i class="fas fa-info-circle"></i>
                <span id="selectedSchoolName"></span>
              </div>
            </div>

            <!-- Filtro de Turno (aparece APENAS na aba de Turmas) -->
            <div id="shiftFilterContainer" class="shift-filter" style="display: none;">
              <div class="filter-group">
                <label><i class="fas fa-clock"></i> Filtrar por turno:</label>
                <select id="shiftFilter">
                  <option value="all">Todos os turnos</option>
                  <option value="Manhã">Manhã</option>
                  <option value="Tarde">Tarde</option>
                  <option value="Noite">Noite</option>
                  <option value="Integral">Integral</option>
                </select>
              </div>
            </div>

            <!-- Container para mostrar detalhes da turma selecionada -->
            <div id="classDetailsPanel" class="class-details-panel" style="display: none;">
              <div class="class-details-header">
                <button id="backToClassesBtn" class="back-btn">
                  <i class="fas fa-arrow-left"></i> Voltar para turmas
                </button>
                <div class="class-details-title">
                  <i class="fas fa-users"></i>
                  <span id="selectedClassName"></span>
                </div>
              </div>
              <div id="classStudentsList" class="class-students-list"></div>
            </div>

            <!-- LISTA DE RANKING COM SCROLL -->
            <div class="ranking-scroll-area">
              <div id="rankList" class="rank-list">
                <div class="loading">
                  <i class="fas fa-spinner fa-pulse"></i>
                  <p>Carregando rankings...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <span>Metric</span>
          <span>Desenvolvido pela NwareLink</span>
          <div class="footer-links">
            <a href="#"><i class="fas fa-info-circle"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
          </div>
        </div>
      </footer>
    </div>

    <script src="./JS/background.js"></script>
    <script src="./JS/index.js"></script>
  </body>
</html>
